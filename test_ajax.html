<!DOCTYPE html>
<html>
<head>
    <title>Test Technicians AJAX</title>
</head>
<body>
    <h1>Testing Technicians AJAX Endpoint</h1>
    <button onclick="testEndpoint()">Test list_techs Endpoint</button>
    <pre id="output"></pre>

    <script>
        function testEndpoint() {
            const output = document.getElementById('output');
            output.textContent = 'Loading...';

            fetch('http://localhost:8080/admin_v2.php?action=list_techs&page=1&search=')
                .then(response => {
                    console.log('Response status:', response.status);
                    console.log('Response headers:', response.headers);
                    return response.text();
                })
                .then(text => {
                    output.textContent = 'Raw response:\n' + text;
                    console.log('Raw response:', text);

                    // Try to parse as JSON
                    try {
                        const json = JSON.parse(text);
                        output.textContent += '\n\nParsed JSON:\n' + JSON.stringify(json, null, 2);
                    } catch (e) {
                        output.textContent += '\n\nJSON parse error: ' + e.message;
                    }
                })
                .catch(err => {
                    output.textContent = 'Error: ' + err.message;
                    console.error('Fetch error:', err);
                });
        }

        // Auto-run on page load
        window.onload = testEndpoint;
    </script>
</body>
</html>
