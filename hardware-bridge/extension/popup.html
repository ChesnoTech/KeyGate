<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OEM Hardware Bridge</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #2c3e50;
    }
    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .status.connected {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    button:hover {
      background: #0056b3;
    }
    .version {
      font-size: 11px;
      color: #999;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h3>🔌 OEM Hardware Bridge</h3>

  <div id="status" class="status disconnected">
    <strong>Status:</strong> Checking...
  </div>

  <div class="info">
    <p>This extension allows the OEM Activation admin panel to detect USB hardware information securely.</p>
  </div>

  <button id="testBtn">🔍 Test Connection</button>

  <div class="version">Version 1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
